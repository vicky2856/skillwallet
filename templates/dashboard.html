<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Electric Cars Tableau Dashboard</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6fb; }
      header { padding: 1.25rem 2rem; background: #0b3d91; color: white; }
      main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
      .embed-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
      .embed-container iframe, .embed-container object, .embed-container embed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
      .back-link { display: inline-block; margin-top: 1rem; color: #0078d4; text-decoration: none; }
      .back-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <h1>Electric Cars - Tableau Dashboard</h1>
    </header>

    <main>
      <p>This page embeds a Tableau visualization. Paste your Tableau embed code snippet below into the <code>&lt;div id="tableauViz"&gt;</code> block.</p>

      <div class="embed-container" id="tableauViz">
        <!--
          Paste your Tableau embed snippet here.
          Example (replace URL with your Tableau view):

          <iframe src="https://public.tableau.com/views/YourWorkbook/YourView?:embed=y&:showVizHome=no" width="100%" height="100%" frameborder="0"></iframe>

          Or use the <object> tag approach that Tableau provides.
        -->
      </div>

      <p><a class="back-link" href="/">← Back to home</a></p>
    </main>
  </body>
</html>
